<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lako — Galeria de Eventos</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0b0b;
      --surface: #111111;
      --border: rgba(255,255,255,0.08);
      --accent: #c8a96e;
      --text: #f0ede8;
      --muted: #7a766f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 56px;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }

    /* ── HEADER DA GALERIA ── */
    .gallery-header {
      padding: 100px 56px 60px;
      text-align: center;
    }
    .category-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 15px;
    }
    .gallery-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 20px;
    }
    .gallery-subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── GRID DE FOTOS ── */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 15px;
      padding: 0 56px 100px;
    }
    .photo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
    }
    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .photo-item:hover img { transform: scale(1.04); }

    /* ── FOOTER SIMPLES ── */
    footer {
      padding: 60px 56px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .btn-back {
      display: inline-block;
      padding: 12px 30px;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      transition: all 0.3s;
    }
    .btn-back:hover { background: var(--accent); color: var(--bg); }

    @media (max-width: 768px) {
      nav, .gallery-header, .photos-grid { padding-left: 24px; padding-right: 24px; }
      .photos-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">L<span>.</span>Moraes</a>
  </nav>

  <header class="gallery-header">
    <p class="category-label" id="catLabel">Carregando...</p>
    <h1 class="gallery-title" id="galTitle">Lako Fotografia</h1>
    <p class="gallery-subtitle">Cada clique conta uma história única. Experiência e sensibilidade desde 1999.</p>
  </header>

  <main class="photos-grid" id="gridFotos">
    </main>

  <footer>
    <a href="index.html" class="btn-back">← Voltar ao Portfólio</a>
  </footer>

  <script>
    /* 1. DADOS DOS ÁLBUNS (Você pode mover isso para um dados.js depois) */
    const álbunsLako = [
      { 
        id: 1, 
        categoria: 'Casamentos', 
        titulo: 'Ana & Bruno', 
        fotos: ['foto1.jpg', 'foto2.jpg', 'foto3.jpg'] 
      },
      { 
        id: 2, 
        categoria: 'Eventos', 
        titulo: 'Aniversário 15 anos', 
        fotos: ['https://via.placeholder.com/800x1000', 'https://via.placeholder.com/800x600'] 
      }
    ];

    /* 2. LÓGICA DE CAPTURA DA URL */
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    // Busca o álbum correto na lista
    const álbumAtivo = álbunsLako.find(a => a.id == id);

    if (álbumAtivo) {
      // Preenche os textos
      document.getElementById('catLabel').innerText = álbumAtivo.categoria;
      document.getElementById('galTitle').innerText = álbumAtivo.titulo;
      document.title = `Lako — ${álbumAtivo.titulo}`;

      // Cria a grade de fotos
      const grid = document.getElementById('gridFotos');
      álbumAtivo.fotos.forEach(link => {
        const div = document.createElement('div');
        div.className = 'photo-item';
        div.innerHTML = `<img src="${link}" alt="Foto da Lako Fotografia">`;
        grid.appendChild(div);
      });
    } else {
      // Se não encontrar o álbum, avisa o usuário
      document.getElementById('galTitle').innerText = "Álbum não encontrado";
      document.querySelector('.gallery-subtitle').innerText = "O evento que você procura pode ter sido movido ou ainda não foi publicado.";
    }
  </script>
</body>
</html>
